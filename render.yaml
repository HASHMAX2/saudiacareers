services:
  - type: web
    name: saudiacareers-backend
    runtime: node
    region: singapore
    plan: free
    rootDir: backend
    buildCommand: cd backend && npm install && npx prisma generate
    startCommand: cd backend && node server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: JWT_ACCESS_EXPIRES_IN
        value: 15m
      - key: JWT_REFRESH_EXPIRES_IN
        value: 7d
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_KEY
        sync: false
      - key: SUPABASE_STORAGE_BUCKET
        value: SaudiaCareers
      - key: RESEND_API_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: noreply@saudiacareers.com
      - key: FRONTEND_URL
        value: https://saudiacareers.com
      - key: ALLOWED_ORIGINS
        value: https://saudiacareers.com,https://www.saudiacareers.com
      - key: COOKIE_DOMAIN
        value: .saudiacareers.com
